server.port=8080
spring.application.name=api-gateway

# Eureka Registration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=10

# Dynamic Routing Configuration
spring.cloud.gateway.routes[0].id=service-a-route
spring.cloud.gateway.routes[0].uri=lb://SERVICE-A
spring.cloud.gateway.routes[0].predicates[0]=Path=/service-a/**

spring.cloud.gateway.routes[1].id=service-b-route
spring.cloud.gateway.routes[1].uri=lb://SERVICE-B
spring.cloud.gateway.routes[1].predicates[0]=Path=/service-b/**

eureka.instance.instance-id=${spring.cloud.client.ip-address}:${spring.application.name}:${server.port}

spring.cloud.inetutils.ignored-interfaces[0]=vEthernet.*
spring.cloud.inetutils.ignored-interfaces[1]=docker.*

spring.cloud.inetutils.preferred-networks[0]=192.168
spring.cloud.inetutils.preferred-networks[1]=10
