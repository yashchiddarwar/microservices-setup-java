server.port=8082
spring.application.name=service-b

# Eureka Registration
eureka.client.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=10

eureka.instance.instance-id=${spring.cloud.client.ip-address}:${spring.application.name}:${server.port}

spring.cloud.inetutils.ignored-interfaces[0]=vEthernet.*
spring.cloud.inetutils.ignored-interfaces[1]=docker.*

spring.cloud.inetutils.preferred-networks[0]=192.168
spring.cloud.inetutils.preferred-networks[1]=10